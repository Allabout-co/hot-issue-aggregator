<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔥 핫이슈 — 한국 커뮤니티 실시간 모아보기</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <svg class="logo-mark" viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ffb020" />
              <stop offset="1" stop-color="#ff5a36" />
            </linearGradient>
          </defs>
          <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />
        </svg>
        <div>
          <h1>핫이슈</h1>
          <p class="tagline">여러 커뮤니티의 지금 가장 뜨거운 글, 한 화면에서</p>
        </div>
      </div>
      <div class="actions">
        <span id="updated" class="updated">불러오는 중…</span>
        <button id="refreshBtn" class="refresh">↻ 새로고침</button>
      </div>
    </header>

    <nav id="filters" class="filters"></nav>
    <nav id="catFilters" class="filters cat-filters"></nav>

    <section id="briefing" class="briefing" hidden></section>

    <main class="layout">
      <section class="hot-col">
        <h2 class="col-title">🔥 통합 핫랭킹</h2>
        <ol id="hotList" class="hot-list"></ol>
      </section>

      <section class="sources-wrap">
        <h2 class="col-title">커뮤니티별</h2>
        <div id="sourceCols" class="source-cols"></div>
      </section>
    </main>

    <button id="toTop" class="to-top" aria-label="위로 가기" hidden>▲</button>

    <footer class="foot">
      <div id="integrations" class="integrations"></div>
      모든 글의 저작권은 원작성자/커뮤니티에 있으며, 제목·링크만 제공하고 클릭 시 원문으로 이동합니다.
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
